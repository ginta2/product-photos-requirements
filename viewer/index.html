<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Photo Crop Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-left">
            <h1>Crop Viewer</h1>
            <p class="subtitle">See how a 3:2 source crops across all production surfaces</p>
        </div>
        <button id="upload-btn" class="btn-upload">Upload Photo</button>
    </header>

    <div id="modal-overlay" class="hidden">
        <div id="upload-modal">
            <button id="modal-close">&times;</button>
            <div id="drop-zone">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p>Drag & drop a photo here</p>
                <p class="or-text">or</p>
                <label for="file-input" class="btn-browse">Browse files</label>
                <input type="file" id="file-input" accept="image/*" hidden>
            </div>
        </div>
    </div>

    <div id="filter-bar">
        <div class="tabs" id="platform-tabs">
            <button class="tab active" data-filter="all">All</button>
            <button class="tab" data-filter="web">Web</button>
            <button class="tab" data-filter="mobile-rn">Mobile</button>
        </div>
        <div class="controls-right hidden" id="controls">
            <select id="safe-zone">
                <option value="off">Safe zone: Off</option>
                <option value="conservative">Conservative (200/120px)</option>
                <option value="usable">Usable (66/60px)</option>
            </select>
            <label class="toggle-label">
                <input type="checkbox" id="show-labels" checked>
                <span>Labels</span>
            </label>
        </div>
    </div>

    <div id="gallery" class="hidden">
        <div id="tiles"></div>
    </div>

    <div id="empty-state">
        <p class="empty-heading">Your 3:2 source ships at <strong id="surface-count">24</strong> different crop shapes. Upload a photo to see the impact.</p>
        <div id="empty-tiles"></div>
        <div id="specs-section">
            <h2 class="specs-heading">Specifications</h2>
            <div id="specs-table"></div>
        </div>
    </div>

    <script src="viewer.js"></script>
</body>
</html>
